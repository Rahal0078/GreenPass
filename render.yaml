services:
  - type: web
    name: vekay-solar-crm
    env: node
    region: singapore
    plan: free
    buildCommand: >-
      pnpm install &&
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/vekay-solar run build &&
      pnpm --filter @workspace/api-server run build &&
      pnpm --filter @workspace/db run push
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GMAIL_APP_PASSWORD
        sync: false
